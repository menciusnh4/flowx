<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>FlowX · 账号管理 · 平铺 / 列表原型</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;600;700;800&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
<style>
:root{
  --brand-indigo:#6366F1;
  --brand-sky:#38BDF8;
  --brand-grad:linear-gradient(135deg,#6366F1,#38BDF8);
  --brand-grad-soft:rgba(99,102,241,.10);
  --surface:#ffffff;
  --surface-2:#f7f9fc;
  --line:#e9edf5;
  --line-strong:#d8dee9;
  --ink:#1e293b;
  --slate:#475569;
  --muted:#64748b;
  --faint:#94a3b8;
  --success:#10b981;
  --warning:#f59e0b;
  --danger:#ef4444;
  --r-sm:10px; --r-md:14px; --r-lg:18px; --r-pill:999px;
  --shadow-xs:0 1px 2px rgba(15,23,42,.04);
  --shadow-sm:0 4px 12px rgba(15,23,42,.06);
  --shadow-md:0 12px 28px rgba(15,23,42,.10);
  --t:300ms ease; --t-fast:150ms ease; --ease:cubic-bezier(.4,0,.2,1);
  --font-display:'Baloo 2','Plus Jakarta Sans',system-ui,sans-serif;
  --font-ui:'Plus Jakarta Sans',system-ui,-apple-system,'Segoe UI',sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font-ui);background:linear-gradient(180deg,#eef2fb 0%,#f6f8fd 100%);color:var(--ink);min-height:100vh;padding:28px}
.wrap{max-width:1180px;margin:0 auto;display:flex;flex-direction:column;gap:18px}

/* 顶栏 */
.topbar{display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap}
.tb-left{display:flex;align-items:center;gap:12px}
.logo{width:40px;height:40px;border-radius:12px;background:var(--brand-grad);display:flex;align-items:center;justify-content:center;color:#fff;font-family:var(--font-display);font-weight:800;font-size:20px;box-shadow:var(--shadow-sm)}
.tb-title{font-family:var(--font-display);font-size:22px;font-weight:800}
.tb-sub{font-size:12.5px;color:var(--muted)}

/* 视图切换 */
.view-toggle{display:inline-flex;align-items:center;border:1px solid var(--line-strong);border-radius:var(--r-pill);background:var(--surface);padding:4px;gap:2px;box-shadow:var(--shadow-xs)}
.vt-btn{display:inline-flex;align-items:center;gap:6px;height:34px;padding:0 16px;border:none;border-radius:calc(var(--r-pill) - 4px);background:transparent;color:var(--slate);font-size:13px;font-weight:700;font-family:inherit;cursor:pointer;transition:all var(--t-fast) var(--ease);white-space:nowrap}
.vt-btn:hover{color:var(--brand-indigo)}
.vt-btn.active{background:var(--brand-grad);color:#fff;box-shadow:var(--shadow-sm)}

/* 概览 */
.overview{display:grid;grid-template-columns:repeat(4,1fr);gap:14px}
.ov-card{display:flex;align-items:center;gap:13px;padding:16px;border-radius:var(--r-md);background:var(--surface);border:1px solid var(--line);box-shadow:var(--shadow-xs);transition:box-shadow var(--t),transform var(--t) var(--ease)}
.ov-card:hover{box-shadow:var(--shadow-md);transform:translateY(-2px)}
.ov-ic{width:44px;height:44px;border-radius:13px;display:flex;align-items:center;justify-content:center;font-size:21px;flex-shrink:0}
.ov-value{font-family:var(--font-display);font-size:25px;font-weight:800;line-height:1.1;color:var(--ink)}
.ov-label{font-size:12px;color:var(--muted);margin-top:2px}

/* 工具条 */
.toolbar{display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap;padding:14px 16px;border-radius:var(--r-md);background:var(--surface);border:1px solid var(--line);box-shadow:var(--shadow-xs)}
.tb-left-actions{display:flex;align-items:center;gap:10px;flex-wrap:wrap;min-width:0}
.pills{display:flex;gap:8px;flex-wrap:wrap}
.pill{height:34px;padding:0 15px;border-radius:var(--r-pill);border:1px solid var(--line-strong);background:var(--surface);color:var(--slate);font-size:13px;font-weight:600;cursor:pointer;transition:all var(--t-fast) var(--ease);font-family:inherit;white-space:nowrap}
.pill:hover{border-color:var(--brand-indigo);color:var(--brand-indigo);background:var(--brand-grad-soft)}
.pill.active{background:var(--brand-grad);border-color:transparent;color:#fff;box-shadow:var(--shadow-sm)}
.search{position:relative}
.search input{height:38px;width:240px;max-width:42vw;padding:0 14px 0 38px;border-radius:var(--r-pill);border:1px solid var(--line-strong);background:var(--surface-2);font-size:13px;font-family:inherit;color:var(--ink);outline:none;transition:box-shadow var(--t-fast) var(--ease)}
.search input:focus{box-shadow:0 0 0 2px var(--brand-indigo) inset;border-color:transparent}
.search svg{position:absolute;left:13px;top:50%;transform:translateY(-50%);color:var(--faint)}
.hc-tag{font-size:12px;font-weight:600;color:var(--success);background:rgba(16,185,129,.12);border:1px solid rgba(16,185,129,.3);padding:4px 10px;border-radius:var(--r-pill);white-space:nowrap}
.tb-right-actions{display:flex;gap:9px;flex-wrap:wrap}
.btn{display:inline-flex;align-items:center;gap:6px;height:38px;padding:0 15px;border-radius:var(--r-pill);border:1px solid var(--line-strong);background:var(--surface);color:var(--slate);font-size:13px;font-weight:600;font-family:inherit;cursor:pointer;transition:all var(--t-fast) var(--ease);white-space:nowrap}
.btn:hover{border-color:var(--brand-indigo);color:var(--brand-indigo);background:var(--brand-grad-soft)}
.btn.primary{background:var(--brand-grad);border-color:transparent;color:#fff;box-shadow:var(--shadow-sm)}
.btn.primary:hover{filter:brightness(1.05);color:#fff}
.btn.success{border-color:rgba(16,185,129,.4);color:var(--success)}
.btn.success:hover{background:rgba(16,185,129,.1);color:var(--success)}

/* 展示区 */
.body{min-height:140px}
/* 平铺网格 */
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:16px}
.acct-card{display:flex;flex-direction:column;gap:12px;padding:16px;border-radius:var(--r-md);background:var(--surface);border:1px solid var(--line);box-shadow:var(--shadow-xs);transition:box-shadow var(--t),transform var(--t) var(--ease),border-color var(--t)}
.acct-card:hover{box-shadow:var(--shadow-md);transform:translateY(-3px);border-color:var(--line-strong)}
.ac-top{display:flex;align-items:center;justify-content:space-between;gap:8px}
.ac-plat{display:inline-flex;align-items:center;gap:7px;height:28px;padding:0 11px;border-radius:var(--r-pill);border:1px solid transparent;font-size:12.5px;font-weight:700}
.ac-plat-ic{width:16px;height:16px;object-fit:contain;border-radius:4px}
.badge{font-size:11.5px;font-weight:700;padding:3px 9px;border-radius:var(--r-pill)}
.badge.active{color:var(--success);background:rgba(16,185,129,.12)}
.badge.expired{color:var(--warning);background:rgba(245,158,11,.14)}
.badge.inactive{color:var(--faint);background:#f1f5f9}
.ac-body{display:flex;align-items:center;gap:12px}
.avatar{width:48px;height:48px;border-radius:50%;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-family:var(--font-display);font-size:18px;flex-shrink:0;flex-basis:48px}
.ac-id{min-width:0}
.ac-name{font-size:15px;font-weight:700;color:var(--ink);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ac-sub{font-size:12px;color:var(--muted);margin-top:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ac-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;padding:12px 0;border-top:1px solid var(--line);border-bottom:1px solid var(--line)}
.ac-stat{text-align:center}
.ac-stat b{display:block;font-family:var(--font-display);font-size:17px;color:var(--ink);line-height:1.2}
.ac-stat span{font-size:11.5px;color:var(--muted)}
.ac-meta{display:flex;flex-direction:column;gap:8px}
.chips{display:flex;flex-wrap:wrap;gap:5px;min-height:22px}
.chip{font-size:11.5px;font-weight:600;color:var(--slate);background:var(--surface-2);border:1px solid var(--line);padding:2px 9px;border-radius:var(--r-pill)}
.ac-uncat{font-size:12px;color:var(--faint)}
.env{font-size:12px}
.env-on{color:var(--slate);font-weight:600}
.env-off{color:var(--faint)}
.ac-time{font-size:11.5px;color:var(--muted);display:flex;gap:6px;flex-wrap:wrap}
.ac-actions{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-top:2px}
.act{display:inline-flex;align-items:center;justify-content:center;gap:5px;height:34px;border-radius:10px;border:1px solid var(--line-strong);background:var(--surface);color:var(--slate);font-size:12.5px;font-weight:600;font-family:inherit;cursor:pointer;transition:all var(--t-fast) var(--ease)}
.act:hover{background:var(--surface-2)}
.act.success{color:var(--success);border-color:rgba(16,185,129,.35)}
.act.success:hover{background:rgba(16,185,129,.1)}
.act.primary{color:var(--brand-indigo);border-color:rgba(99,102,241,.35)}
.act.primary:hover{background:var(--brand-grad-soft)}
.act.warning{color:var(--warning);border-color:rgba(245,158,11,.35)}
.act.warning:hover{background:rgba(245,158,11,.1)}
.act.danger{color:var(--danger);border-color:rgba(239,68,68,.35)}
.act.danger:hover{background:rgba(239,68,68,.1)}

/* 列表：统一网格表格，表头与行严格对齐 */
.acct-list{display:flex;flex-direction:column;border:1px solid var(--line);border-radius:var(--r-md);overflow:hidden;background:var(--surface)}
.list-head,.list-row{display:grid;grid-template-columns:160px minmax(190px,1.7fr) minmax(220px,1.9fr) minmax(150px,1.3fr) minmax(150px,1.2fr) 140px;align-items:center;column-gap:18px;padding:13px 20px}
.list-row{border-bottom:1px solid var(--line);transition:background var(--t)}
.list-row:last-child{border-bottom:none}
.list-row:hover{background:var(--surface-2)}
.lr-plat{display:flex;align-items:center;gap:8px;flex-shrink:0}
.lr-id{display:flex;align-items:center;gap:10px;min-width:0}
.lr-id .avatar{width:38px;height:38px;flex-basis:38px;font-size:15px}
.lr-idtext{min-width:0}
.lr-stats{display:flex;align-items:center;gap:16px;flex-shrink:0;font-size:12.5px;color:var(--muted)}
.lr-stats b{font-family:var(--font-display);font-size:15px;color:var(--ink);margin-right:3px}
.lr-meta{display:flex;flex-direction:column;gap:6px;flex-shrink:0;min-width:128px}
.lr-time{font-size:11.5px;color:var(--muted);display:flex;gap:6px;flex-wrap:wrap;flex-shrink:0}
.lr-actions{display:flex;gap:6px;justify-self:end;flex-shrink:0}
.icon-btn{width:32px;height:32px;border-radius:9px;border:1px solid var(--line-strong);background:var(--surface);color:var(--slate);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all var(--t-fast) var(--ease)}
.icon-btn:hover{background:var(--surface-2)}
.icon-btn.success{color:var(--success);border-color:rgba(16,185,129,.35)}
.icon-btn.success:hover{background:rgba(16,185,129,.1)}
.icon-btn.primary{color:var(--brand-indigo);border-color:rgba(99,102,241,.35)}
.icon-btn.primary:hover{background:var(--brand-grad-soft)}
.icon-btn.warning{color:var(--warning);border-color:rgba(245,158,11,.35)}
.icon-btn.warning:hover{background:rgba(245,158,11,.1)}
.icon-btn.danger{color:var(--danger);border-color:rgba(239,68,68,.35)}
.icon-btn.danger:hover{background:rgba(239,68,68,.1)}

/* 列表表头 */
.list-head{background:var(--brand-grad-soft);border-bottom:1px solid var(--line);font-size:11.5px;font-weight:800;color:var(--brand-indigo);letter-spacing:.04em}
.list-head .lr-id{padding-left:48px}
.list-head .lr-stats,.list-head .lr-time,.list-head .lr-meta{color:var(--brand-indigo)}
.list-head .lr-stats span{font-size:11.5px;font-weight:800}
.list-head .lr-actions{justify-self:end}

.empty{grid-column:1/-1;color:var(--muted);text-align:center;padding:60px 16px;font-size:14px}

body[data-mode="list"] .grid{display:none}
body[data-mode="grid"] .acct-list{display:none}

@media (max-width:880px){
  .list-head{display:none}
  .list-row{grid-template-columns:1fr;row-gap:10px;padding:14px 16px}
  .list-row .lr-id{padding-left:0}
  .list-row .lr-actions{justify-self:start}
}
@media (max-width:1100px){.overview{grid-template-columns:repeat(2,1fr)}}
@media (max-width:640px){.overview{grid-template-columns:repeat(2,1fr)}.grid{grid-template-columns:1fr}.search input{width:160px}}
</style>
</head>
<body data-mode="grid">
<div class="wrap">
  <!-- 顶栏 -->
  <header class="topbar">
    <div class="tb-left">
      <div class="logo">F</div>
      <div>
        <div class="tb-title">账号管理</div>
        <div class="tb-sub">统一授权、分组与账号健康监测</div>
      </div>
    </div>
    <div class="view-toggle" role="group" aria-label="展示方式">
      <button class="vt-btn active" data-mode="grid" onclick="setMode('grid')">
        <svg viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7" rx="1.5"/><rect x="14" y="3" width="7" height="7" rx="1.5"/><rect x="3" y="14" width="7" height="7" rx="1.5"/><rect x="14" y="14" width="7" height="7" rx="1.5"/></svg>
        <span>平铺</span>
      </button>
      <button class="vt-btn" data-mode="list" onclick="setMode('list')">
        <svg viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3.5" y1="6" x2="3.5" y2="6"/><line x1="3.5" y1="12" x2="3.5" y2="12"/><line x1="3.5" y1="18" x2="3.5" y2="18"/></svg>
        <span>列表</span>
      </button>
    </div>
  </header>

  <!-- 概览 -->
  <section class="overview" id="overview"></section>

  <!-- 工具条 -->
  <section class="toolbar">
    <div class="tb-left-actions">
      <div class="pills" id="pills"></div>
      <div class="search">
        <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input id="search" placeholder="搜索昵称 / 账号 / 平台" oninput="render()" />
      </div>
      <span class="hc-tag">定时检测 · 60 分钟</span>
    </div>
    <div class="tb-right-actions">
      <button class="btn primary">＋ 授权新账号</button>
      <button class="btn">📁 分类管理</button>
      <button class="btn">⚙ 检测设置</button>
      <button class="btn success">📡 批量检测</button>
      <button class="btn">↻ 刷新</button>
    </div>
  </section>

  <!-- 展示区 -->
  <section class="body" id="body"></section>
</div>

<script>
const PLAT = {
  xiaohongshu:{name:'小红书',color:'#ff2442'},
  douyin:{name:'抖音',color:'#fe2c55'},
  kuaishou:{name:'快手',color:'#ff4906'},
  bilibili:{name:'哔哩哔哩',color:'#00a1d6'},
  wechat_channels:{name:'视频号',color:'#07c160'},
  weibo:{name:'微博',color:'#e6162d'},
  zhihu:{name:'知乎',color:'#0084ff'},
  toutiao:{name:'头条',color:'#f04142'},
};
const STATUS = {
  active:{text:'正常',cls:'active'},
  expired:{text:'已过期',cls:'expired'},
  inactive:{text:'未激活',cls:'inactive'},
};
const CATS = [
  {id:'c1',name:'日常号'},{id:'c2',name:'种草号'},{id:'c3',name:'矩阵号'},{id:'c4',name:'备用号'},
];
const ACCOUNTS = [
  {id:1,nick:'莓莓的日常',plat:'xiaohongshu',status:'active',fans:128000,follow:320,like:980000,cat:['c1','c2'],env:'创作环境 A',auth:Date.now()-86400000*3,check:Date.now()-3600000},
  {id:2,nick:'阿强说车',plat:'douyin',status:'active',fans:560000,follow:88,like:3200000,cat:['c3'],env:null,auth:Date.now()-86400000*12,check:Date.now()-7200000},
  {id:3,nick:'吃货小鹿',plat:'kuaishou',status:'expired',fans:34000,follow:510,like:120000,cat:['c2'],env:'创作环境 B',auth:Date.now()-86400000*40,check:Date.now()-86400000*2},
  {id:4,nick:'影评阿白',plat:'bilibili',status:'active',fans:210000,follow:140,like:1500000,cat:['c3','c4'],env:null,auth:Date.now()-86400000*8,check:Date.now()-1800000},
  {id:5,nick:'生活家Lily',plat:'wechat_channels',status:'active',fans:76000,follow:60,like:430000,cat:['c1'],env:'创作环境 A',auth:Date.now()-86400000*5,check:Date.now()-5400000},
  {id:6,nick:'热点观察员',plat:'weibo',status:'inactive',fans:12,follow:9,like:30,cat:[],env:null,auth:Date.now()-86400000*1,check:null},
  {id:7,nick:'知识官小张',plat:'zhihu',status:'active',fans:89000,follow:230,like:560000,cat:['c4'],env:null,auth:Date.now()-86400000*20,check:Date.now()-9000000},
  {id:8,nick:'资讯快报',plat:'toutiao',status:'expired',fans:4500,follow:1200,like:22000,cat:['c3'],env:'创作环境 B',auth:Date.now()-86400000*55,check:Date.now()-86400000*5},
  {id:9,nick:'甜筒旅行',plat:'xiaohongshu',status:'active',fans:310000,follow:410,like:2100000,cat:['c1','c3'],env:null,auth:Date.now()-86400000*15,check:Date.now()-2700000},
];

let filterCat='', mode = (()=>{try{return localStorage.getItem('flowx-acct-viewmode')||'grid'}catch{return 'grid'}})();

function platChip(p){const c=PLAT[p];return `background:${c.color}14;color:${c.color};border-color:${c.color}33`}
function fmtCount(n){if(typeof n!=='number')return '—';if(n>=10000)return (n/10000).toFixed(n>=100000?0:1).replace(/\.0$/,'')+'万';if(n>=1000)return (n/1000).toFixed(1).replace(/\.0$/,'')+'k';return String(n)}
function fmtDate(t){if(!t)return '—';const d=new Date(t);const p=x=>String(x).padStart(2,'0');return `${d.getFullYear()}-${p(d.getMonth()+1)}-${p(d.getDate())}`}
function catName(id){return CATS.find(c=>c.id===id)?.name||'未知'}

function filtered(){
  let list=ACCOUNTS;
  if(filterCat){
    if(filterCat==='unclassified') list=list.filter(a=>!a.cat||a.cat.length===0);
    else list=list.filter(a=>a.cat&&a.cat.includes(filterCat));
  }
  const q=document.getElementById('search').value.trim().toLowerCase();
  if(q) list=list.filter(a=>a.nick.toLowerCase().includes(q)||PLAT[a.plat].name.toLowerCase().includes(q));
  return list;
}

/* 概览 */
function renderOverview(){
  const total=ACCOUNTS.length;
  const active=ACCOUNTS.filter(a=>a.status==='active').length;
  const expired=ACCOUNTS.filter(a=>a.status==='expired').length;
  const plats=new Set(ACCOUNTS.map(a=>a.plat)).size;
  const m=[
    {ic:'👥',label:'账号总数',value:total,tint:'rgba(99,102,241,.12)'},
    {ic:'✅',label:'活跃可用',value:active,tint:'rgba(16,185,129,.12)'},
    {ic:'⚠️',label:'已过期',value:expired,tint:'rgba(244,63,94,.12)'},
    {ic:'🌐',label:'覆盖平台',value:plats,tint:'rgba(56,189,248,.14)'},
  ];
  document.getElementById('overview').innerHTML=m.map(x=>`
    <div class="ov-card">
      <div class="ov-ic" style="background:${x.tint}">${x.ic}</div>
      <div><div class="ov-value">${x.value}</div><div class="ov-label">${x.label}</div></div>
    </div>`).join('');
}

/* 分类 pill */
function renderPills(){
  const items=[{id:'',name:'全部分类'},{id:'unclassified',name:'未分类'},...CATS];
  document.getElementById('pills').innerHTML=items.map(c=>`
    <button class="pill ${filterCat===c.id?'active':''}" onclick="setCat('${c.id}')">${c.name}</button>`).join('');
}
function setCat(id){filterCat=id;renderPills();render()}

/* 卡片（平铺） */
function cardHTML(a){
  const p=PLAT[a.plat],s=STATUS[a.status];
  const cats=(a.cat&&a.cat.length)?a.cat.map(id=>`<span class="chip">${catName(id)}</span>`).join(''):'<span class="ac-uncat">未分类</span>';
  const env=a.env?`<span class="env-on">🔒 ${a.env}</span>`:`<span class="env-off">本机直连</span>`;
  return `<article class="acct-card">
    <div class="ac-top">
      <span class="ac-plat" style="${platChip(a.plat)}">${p.name}</span>
      <span class="badge ${s.cls}">${s.text}</span>
    </div>
    <div class="ac-body">
      <div class="avatar" style="background:${p.color}">${a.nick.slice(0,1)}</div>
      <div class="ac-id"><div class="ac-name">${a.nick}</div><div class="ac-sub">${p.name}号 · ID ${a.id}0${a.id}</div></div>
    </div>
    <div class="ac-stats">
      <div class="ac-stat"><b>${fmtCount(a.fans)}</b><span>粉丝</span></div>
      <div class="ac-stat"><b>${fmtCount(a.follow)}</b><span>关注</span></div>
      <div class="ac-stat"><b>${fmtCount(a.like)}</b><span>获赞</span></div>
    </div>
    <div class="ac-meta"><div class="chips">${cats}</div><div class="env">${env}</div></div>
    <div class="ac-time"><span>授权 ${fmtDate(a.auth)}</span><span>· 检测 ${fmtDate(a.check)}</span></div>
    <div class="ac-actions">
      <button class="act success">🔗 创作中心</button>
      <button class="act primary">✎ 编辑</button>
      <button class="act warning">↻ 刷新</button>
      <button class="act danger">🗑 删除</button>
    </div>
  </article>`;
}

/* 列表行 */
function rowHTML(a){
  const p=PLAT[a.plat],s=STATUS[a.status];
  const cats=(a.cat&&a.cat.length)?a.cat.map(id=>`<span class="chip">${catName(id)}</span>`).join(''):'<span class="ac-uncat">未分类</span>';
  const env=a.env?`<span class="env-on">🔒 ${a.env}</span>`:`<span class="env-off">本机直连</span>`;
  return `<article class="list-row">
    <div class="lr-plat">
      <span class="ac-plat" style="${platChip(a.plat)}">${p.name}</span>
      <span class="badge ${s.cls}">${s.text}</span>
    </div>
    <div class="lr-id">
      <div class="avatar" style="background:${p.color}">${a.nick.slice(0,1)}</div>
      <div class="lr-idtext"><div class="ac-name">${a.nick}</div><div class="ac-sub">${p.name}号 · ID ${a.id}0${a.id}</div></div>
    </div>
    <div class="lr-stats"><span><b>${fmtCount(a.fans)}</b>粉丝</span><span><b>${fmtCount(a.follow)}</b>关注</span><span><b>${fmtCount(a.like)}</b>获赞</span></div>
    <div class="lr-meta"><div class="chips">${cats}</div><div class="env">${env}</div></div>
    <div class="lr-time"><span>授权 ${fmtDate(a.auth)}</span><span>· 检测 ${fmtDate(a.check)}</span></div>
    <div class="lr-actions">
      <button class="icon-btn success" title="创作中心">🔗</button>
      <button class="icon-btn primary" title="编辑">✎</button>
      <button class="icon-btn warning" title="刷新">↻</button>
      <button class="icon-btn danger" title="删除">🗑</button>
    </div>
  </article>`;
}

function headHTML(){
  return `<header class="list-head" aria-hidden="true">
    <div class="lr-plat">平台 / 状态</div>
    <div class="lr-id">账号</div>
    <div class="lr-stats"><span>粉丝</span><span>关注</span><span>获赞</span></div>
    <div class="lr-meta">分类 / 环境</div>
    <div class="lr-time">授权 / 检测</div>
    <div class="lr-actions">操作</div>
  </header>`;
}

function render(){
  const list=filtered();
  const body=document.getElementById('body');
  const empty=`<div class="empty">没有匹配的账号。</div>`;
  body.innerHTML=`<div class="grid">${list.map(cardHTML).join('')}</div><div class="acct-list">${headHTML()}${list.map(rowHTML).join('')}</div>`+ (list.length?'':empty);
  applyMode();
}

function setMode(m){
  mode=m;
  try{localStorage.setItem('flowx-acct-viewmode',m)}catch{}
  applyMode();
}
function applyMode(){
  document.body.dataset.mode=mode;
  document.querySelectorAll('.vt-btn').forEach(b=>b.classList.toggle('active',b.dataset.mode===mode));
}

renderOverview();
renderPills();
render();
applyMode();
</script>
</body>
</html>
